name: Terragrunt Plan

on:
  pull_request:
    branches: [main]
    paths:
      - "live/**"
      - "modules/**"
      - ".github/workflows/terraform-plan.yml"

  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment to plan"
        required: true
        default: "dev"
        type: choice
        options: [dev]

permissions:
  id-token: write        # Required for OIDC token issuance
  contents: read
  pull-requests: write   # Required to post plan output as PR comment
  security-events: write # Required to upload Checkov SARIF to Code Scanning

env:
  TF_VERSION: "1.9.5"
  TG_VERSION: "0.67.0"
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}

jobs:
  security-scan:
    name: Security & Lint Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Checkov (policy-as-code)
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: modules/
          framework: terraform
          output_format: sarif
          output_file_path: checkov-results.sarif
          soft_fail: false
          skip_check: "CKV_AWS_7"   # KMS key rotation — acceptable in dev

      - name: Upload Checkov SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        continue-on-error: true   # requires GitHub Advanced Security on private repos
        with:
          sarif_file: checkov-results.sarif

      - name: Upload Checkov results as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: checkov-results
          path: checkov-results.sarif
          retention-days: 7

      - name: Run TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.51.1

      - name: TFLint init
        run: tflint --init

      - name: TFLint check
        run: tflint --recursive --format compact

  plan:
    name: Terragrunt Plan — ${{ matrix.component }}
    runs-on: ubuntu-latest
    needs: security-scan

    strategy:
      fail-fast: false
      matrix:
        component:
          - live/dev/us-east-1/vpc
          - live/dev/us-east-1/compute

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-Plan-${{ github.run_id }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Setup Terragrunt
        run: |
          curl -sL https://github.com/gruntwork-io/terragrunt/releases/download/v${TG_VERSION}/terragrunt_linux_amd64 \
            -o /usr/local/bin/terragrunt
          chmod +x /usr/local/bin/terragrunt
          terragrunt --version

      - name: Bootstrap state backend
        run: |
          BUCKET="tfstate-${AWS_ACCOUNT_ID}-${AWS_REGION}"

          aws s3api create-bucket --bucket "${BUCKET}" --region "${AWS_REGION}" 2>/dev/null || true

          aws s3api put-bucket-versioning --bucket "${BUCKET}" \
            --versioning-configuration Status=Enabled 2>/dev/null || true

          aws s3api put-bucket-encryption --bucket "${BUCKET}" \
            --server-side-encryption-configuration \
            '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"},"BucketKeyEnabled":true}]}' \
            2>/dev/null || true

          aws s3api put-public-access-block --bucket "${BUCKET}" \
            --public-access-block-configuration \
            "BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=false,RestrictPublicBuckets=true" \
            2>/dev/null || true

          cat > /tmp/bucket-policy.json << POLICY
          {
            "Version": "2012-10-17",
            "Statement": [{
              "Sid": "DenyNonTLS",
              "Effect": "Deny",
              "Principal": "*",
              "Action": "s3:*",
              "Resource": ["arn:aws:s3:::${BUCKET}", "arn:aws:s3:::${BUCKET}/*"],
              "Condition": {"Bool": {"aws:SecureTransport": "false"}}
            }]
          }
          POLICY
          aws s3api put-bucket-policy --bucket "${BUCKET}" \
            --policy file:///tmp/bucket-policy.json 2>/dev/null || true

          aws dynamodb create-table \
            --table-name "terraform-locks-${AWS_ACCOUNT_ID}" \
            --attribute-definitions AttributeName=LockID,AttributeType=S \
            --key-schema AttributeName=LockID,KeyType=HASH \
            --billing-mode PAY_PER_REQUEST \
            --region "${AWS_REGION}" 2>/dev/null || true

      - name: Terragrunt Plan
        id: plan
        working-directory: ${{ matrix.component }}
        run: |
          terragrunt --non-interactive plan -out=tfplan.binary -no-color 2>&1 | tee plan.txt
          echo "exitcode=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Post plan to PR
        uses: actions/github-script@v7
        if: always() && github.event_name == 'pull_request'
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ matrix.component }}/plan.txt', 'utf8');
            const truncated = plan.length > 60000
              ? plan.substring(0, 60000) + '\n\n... output truncated ...'
              : plan;
            const body = `## Terragrunt Plan — \`${{ matrix.component }}\`
            <details><summary>Show Plan</summary>

            \`\`\`hcl
            ${truncated}
            \`\`\`
            </details>

            > Plan exit code: ${{ steps.plan.outputs.exitcode }}`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Fail if plan errored
        if: steps.plan.outputs.exitcode == '1'
        run: exit 1
