name: Terragrunt Plan

on:
  pull_request:
    branches: [main]
    paths:
      - "live/**"
      - "modules/**"
      - ".github/workflows/terraform-plan.yml"

  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment to plan"
        required: true
        default: "dev"
        type: choice
        options: [dev]

permissions:
  id-token: write       # Required for OIDC token issuance
  contents: read
  pull-requests: write  # Required to post plan output as PR comment

env:
  TF_VERSION: "1.9.5"
  TG_VERSION: "0.67.0"
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}

jobs:
  security-scan:
    name: Security & Lint Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Checkov (policy-as-code)
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: modules/
          framework: terraform
          output_format: sarif
          output_file_path: checkov-results.sarif
          soft_fail: false
          skip_check: "CKV_AWS_7"   # KMS key rotation — acceptable in dev

      - name: Upload Checkov SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: checkov-results.sarif

      - name: Run TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.51.1

      - name: TFLint init
        run: tflint --init

      - name: TFLint check
        run: tflint --recursive --format compact

  plan:
    name: Terragrunt Plan — ${{ matrix.component }}
    runs-on: ubuntu-latest
    needs: security-scan

    strategy:
      fail-fast: false
      matrix:
        component:
          - live/dev/us-east-1/vpc
          - live/dev/us-east-1/compute

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-Plan-${{ github.run_id }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Setup Terragrunt
        run: |
          curl -sL https://github.com/gruntwork-io/terragrunt/releases/download/v${TG_VERSION}/terragrunt_linux_amd64 \
            -o /usr/local/bin/terragrunt
          chmod +x /usr/local/bin/terragrunt
          terragrunt --version

      - name: Terragrunt Plan
        id: plan
        working-directory: ${{ matrix.component }}
        run: |
          terragrunt plan -out=tfplan.binary -no-color --non-interactive 2>&1 | tee plan.txt
          echo "exitcode=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Post plan to PR
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ matrix.component }}/plan.txt', 'utf8');
            const truncated = plan.length > 60000
              ? plan.substring(0, 60000) + '\n\n... output truncated ...'
              : plan;
            const body = `## Terragrunt Plan — \`${{ matrix.component }}\`
            <details><summary>Show Plan</summary>

            \`\`\`hcl
            ${truncated}
            \`\`\`
            </details>

            > Plan exit code: ${{ steps.plan.outputs.exitcode }}`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Fail if plan errored
        if: steps.plan.outputs.exitcode == '1'
        run: exit 1
