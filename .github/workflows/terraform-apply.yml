name: Terragrunt Apply

on:
  push:
    branches: [main]
    paths:
      - "live/**"
      - "modules/**"

  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options: [dev]

permissions:
  id-token: write
  contents: read

env:
  TF_VERSION: "1.9.5"
  TG_VERSION: "0.67.0"
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}

jobs:
  apply-vpc:
    name: Terragrunt Apply — VPC
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'dev' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-Apply-VPC-${{ github.run_id }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Setup Terragrunt
        run: |
          curl -sL https://github.com/gruntwork-io/terragrunt/releases/download/v${TG_VERSION}/terragrunt_linux_amd64 \
            -o /usr/local/bin/terragrunt
          chmod +x /usr/local/bin/terragrunt

      - name: Bootstrap state backend
        run: |
          BUCKET="tfstate-${AWS_ACCOUNT_ID}-${AWS_REGION}"

          aws s3api create-bucket --bucket "${BUCKET}" --region "${AWS_REGION}" 2>/dev/null || true

          aws s3api put-bucket-versioning --bucket "${BUCKET}" \
            --versioning-configuration Status=Enabled 2>/dev/null || true

          aws s3api put-bucket-encryption --bucket "${BUCKET}" \
            --server-side-encryption-configuration \
            '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"},"BucketKeyEnabled":true}]}' \
            2>/dev/null || true

          aws s3api put-public-access-block --bucket "${BUCKET}" \
            --public-access-block-configuration \
            "BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=false,RestrictPublicBuckets=true" \
            2>/dev/null || true

          cat > /tmp/bucket-policy.json << POLICY
          {
            "Version": "2012-10-17",
            "Statement": [{
              "Sid": "DenyNonTLS",
              "Effect": "Deny",
              "Principal": "*",
              "Action": "s3:*",
              "Resource": ["arn:aws:s3:::${BUCKET}", "arn:aws:s3:::${BUCKET}/*"],
              "Condition": {"Bool": {"aws:SecureTransport": "false"}}
            }]
          }
          POLICY
          aws s3api put-bucket-policy --bucket "${BUCKET}" \
            --policy file:///tmp/bucket-policy.json 2>/dev/null || true

          aws dynamodb create-table \
            --table-name "terraform-locks-${AWS_ACCOUNT_ID}" \
            --attribute-definitions AttributeName=LockID,AttributeType=S \
            --key-schema AttributeName=LockID,KeyType=HASH \
            --billing-mode PAY_PER_REQUEST \
            --region "${AWS_REGION}" 2>/dev/null || true

      - name: Terragrunt Apply — VPC
        working-directory: live/dev/us-east-1/vpc
        run: terragrunt --non-interactive apply -auto-approve -no-color

  apply-compute:
    name: Terragrunt Apply — Compute
    runs-on: ubuntu-latest
    needs: apply-vpc
    environment: ${{ inputs.environment || 'dev' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-Apply-Compute-${{ github.run_id }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Setup Terragrunt
        run: |
          curl -sL https://github.com/gruntwork-io/terragrunt/releases/download/v${TG_VERSION}/terragrunt_linux_amd64 \
            -o /usr/local/bin/terragrunt
          chmod +x /usr/local/bin/terragrunt

      - name: Bootstrap state backend
        run: |
          BUCKET="tfstate-${AWS_ACCOUNT_ID}-${AWS_REGION}"

          aws s3api create-bucket --bucket "${BUCKET}" --region "${AWS_REGION}" 2>/dev/null || true

          aws s3api put-bucket-versioning --bucket "${BUCKET}" \
            --versioning-configuration Status=Enabled 2>/dev/null || true

          aws s3api put-bucket-encryption --bucket "${BUCKET}" \
            --server-side-encryption-configuration \
            '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"},"BucketKeyEnabled":true}]}' \
            2>/dev/null || true

          aws s3api put-public-access-block --bucket "${BUCKET}" \
            --public-access-block-configuration \
            "BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=false,RestrictPublicBuckets=true" \
            2>/dev/null || true

          cat > /tmp/bucket-policy.json << POLICY
          {
            "Version": "2012-10-17",
            "Statement": [{
              "Sid": "DenyNonTLS",
              "Effect": "Deny",
              "Principal": "*",
              "Action": "s3:*",
              "Resource": ["arn:aws:s3:::${BUCKET}", "arn:aws:s3:::${BUCKET}/*"],
              "Condition": {"Bool": {"aws:SecureTransport": "false"}}
            }]
          }
          POLICY
          aws s3api put-bucket-policy --bucket "${BUCKET}" \
            --policy file:///tmp/bucket-policy.json 2>/dev/null || true

          aws dynamodb create-table \
            --table-name "terraform-locks-${AWS_ACCOUNT_ID}" \
            --attribute-definitions AttributeName=LockID,AttributeType=S \
            --key-schema AttributeName=LockID,KeyType=HASH \
            --billing-mode PAY_PER_REQUEST \
            --region "${AWS_REGION}" 2>/dev/null || true

      - name: Terragrunt Apply — Compute
        working-directory: live/dev/us-east-1/compute
        run: terragrunt --non-interactive apply -auto-approve -no-color
